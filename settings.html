<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Manager – Settings</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="utils.js"></script>
  <script src="settings.js" defer></script>
</head>
<body>
  <header class="dashboard-header">
    <div>
      <h1>Settings</h1>
      <p class="greeting" id="greeting">Profile &amp; preferences</p>
    </div>
    <div class="header-actions">
      <a href="dashboard.html" class="btn btn-secondary btn-sm">← Dashboard</a>
      <button type="button" id="logout-btn" class="btn btn-secondary btn-sm">Log Out</button>
    </div>
  </header>

  <main class="settings-main">
    <div class="settings-grid">

      <section class="section-card">
        <h2>Profile</h2>
        <form id="profile-form" class="settings-form">
          <div class="form-group">
            <label for="profile-username">Username</label>
            <input type="text" id="profile-username" required />
          </div>
          <div class="form-group">
            <label for="profile-email">Email</label>
            <input type="email" id="profile-email" disabled />
            <span class="field-hint">Email cannot be changed in demo mode.</span>
          </div>
          <button type="submit" class="btn btn-primary">Save Profile</button>
        </form>
        <p id="profile-message" class="message"></p>
      </section>

      <section class="section-card">
        <h2>Change Password</h2>
        <form id="password-form" class="settings-form">
          <div class="form-group">
            <label for="current-password">Current password</label>
            <input type="password" id="current-password" required autocomplete="current-password" />
          </div>
          <div class="form-group">
            <label for="new-password">New password</label>
            <input type="password" id="new-password" required autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm new password</label>
            <input type="password" id="confirm-password" required autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
        <p id="password-message" class="message"></p>
      </section>

      <section class="section-card span-2">
        <h2>Preferences</h2>
        <form id="preferences-form" class="settings-form">
          <div class="form-group">
            <label for="theme-select">Theme</label>
            <select id="theme-select">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </div>

          <div class="form-group toggle-row">
            <div>
              <label for="notifications-enabled">Due date reminders</label>
              <span class="field-hint">Browser notifications for tasks due today or overdue.</span>
            </div>
            <input type="checkbox" id="notifications-enabled" class="toggle-checkbox" />
          </div>

          <div class="form-group">
            <label for="reminder-hour">Daily reminder check (hour, 0–23)</label>
            <input type="number" id="reminder-hour" min="0" max="23" value="9" />
            <span class="field-hint">Reminders also run when you open the dashboard.</span>
          </div>

          <button type="button" id="enable-notifications-btn" class="btn btn-secondary">
            Allow browser notifications
          </button>

          <p id="notification-status" class="field-hint"></p>

          <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Save Preferences</button>
        </form>
        <p id="preferences-message" class="message"></p>
      </section>

    </div>
  </main>
</body>
</html>
