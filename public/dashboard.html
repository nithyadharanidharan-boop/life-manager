<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Life Manager - Dashboard</title>
</head>
<body>
  <h1>Dashboard</h1>

  <h2>Create Task</h2>
  <form id="task-form">
    <input type="text" id="task-title" placeholder="Title" required />
    <input type="text" id="task-desc" placeholder="Description" />
    <input type="datetime-local" id="task-due" required />
    <select id="task-priority">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <label>
      <input type="checkbox" id="task-alarm" />
      Enable alarm
    </label>
    <button type="submit">Add Task</button>
  </form>

  <h3>Your Tasks</h3>
  <ul id="tasks-list"></ul>

  <h2>Add Savings Entry</h2>
  <form id="savings-form">
    <input type="date" id="savings-date" required />
    <input type="number" id="savings-amount" placeholder="Amount" required />
    <select id="savings-type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <input type="text" id="savings-category" placeholder="Category" />
    <input type="text" id="savings-note" placeholder="Note" />
    <button type="submit">Add Entry</button>
  </form>

  <h3>Your Savings</h3>
  <p id="total-savings"></p>
  <ul id="savings-list"></ul>

  <script>
    const tasksList = document.getElementById('tasks-list');
    const savingsList = document.getElementById('savings-list');
    const totalSavingsEl = document.getElementById('total-savings');

    // Load tasks
    async function loadTasks() {
      try {
        const res = await fetch('/api/tasks');
        const data = await res.json();
        tasksList.innerHTML = '';
        (data.tasks || []).forEach((task) => {
          const li = document.createElement('li');
          li.textContent = `${task.title} - due at ${task.dueAt} - status: ${task.status}`;
          tasksList.appendChild(li);
        });
      } catch (err) {
        tasksList.innerHTML = '<li>Error loading tasks</li>';
      }
    }

    // Load savings
    async function loadSavings() {
      try {
        const res = await fetch('/api/savings');
        const data = await res.json();
        savingsList.innerHTML = '';
        totalSavingsEl.textContent = `Total savings: ${data.totalSavings}`;
        (data.entries || []).forEach((entry) => {
          const li = document.createElement('li');
          li.textContent = `${entry.date} - ${entry.type} - ${entry.amount} (${entry.category})`;
          savingsList.appendChild(li);
        });
      } catch (err) {
        savingsList.innerHTML = '<li>Error loading savings</li>';
      }
    }

    // Handle new task
    document.getElementById('task-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('task-title').value;
      const description = document.getElementById('task-desc').value;
      const dueAt = document.getElementById('task-due').value;
      const priority = document.getElementById('task-priority').value;
      const alarmEnabled = document.getElementById('task-alarm').checked;

      try {
        await fetch('/api/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description, dueAt, priority, alarmEnabled }),
        });
        await loadTasks();
      } catch (err) {
        alert('Error adding task');
      }
    });

    // Handle new savings entry
    document.getElementById('savings-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const date = document.getElementById('savings-date').value;
      const amount = document.getElementById('savings-amount').value;
      const type = document.getElementById('savings-type').value;
      const category = document.getElementById('savings-category').value;
      const note = document.getElementById('savings-note').value;

      try {
        await fetch('/api/savings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date, amount, type, category, note }),
        });
        await loadSavings();
      } catch (err) {
        alert('Error adding savings entry');
      }
    });

    // Initial load
    loadTasks();
    loadSavings();
  </script>
</body>
</html>
