<script>
  const messageEl = document.getElementById('message');

  // Fake "database" in localStorage
  function getUsers() {
    const raw = localStorage.getItem('lm-users');
    return raw ? JSON.parse(raw) : [];
  }

  function saveUsers(users) {
    localStorage.setItem('lm-users', JSON.stringify(users));
  }

  // Signup handler (pure front-end)
  document.getElementById('signup-form').addEventListener('submit', (e) => {
    e.preventDefault();

    const username = document.getElementById('signup-username').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;

    if (!username || !email || !password) {
      messageEl.textContent = 'Please fill all signup fields';
      return;
    }

    const users = getUsers();

    if (users.some(u => u.email === email)) {
      messageEl.textContent = 'An account with this email already exists';
      return;
    }

    users.push({ username, email, password });
    saveUsers(users);

    messageEl.textContent = 'Signup successful! You can now log in.';
    e.target.reset();
  });

  // Login handler (pure front-end)
  document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      messageEl.textContent = 'Please enter email and password';
      return;
    }

    const users = getUsers();
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
      messageEl.textContent = 'Invalid email or password';
      return;
    }

    messageEl.textContent = `Welcome back, ${user.username}! (demo login)`;
    // For a real app, you would redirect or show the dashboard:
    // window.location.href = 'dashboard.html';
  });
</script>
