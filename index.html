<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Manager – Login</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="utils.js"></script>
  <script src="auth.js" defer></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Life Manager</h1>
    <p class="auth-subtitle">Organize tasks, habits, goals &amp; notes</p>

    <div class="auth-tabs">
      <button type="button" class="auth-tab active" data-tab="login">Login</button>
      <button type="button" class="auth-tab" data-tab="signup">Sign Up</button>
    </div>

    <div id="login-panel" class="auth-panel active">
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary">Log In</button>
      </form>
    </div>

    <div id="signup-panel" class="auth-panel">
      <form id="signup-form">
        <div class="form-group">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" placeholder="Your name" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Choose a password" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
    </div>

    <p id="message" class="message"></p>
  </div>
</body>
</html>
